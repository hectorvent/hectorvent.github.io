<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <defs>
    <!-- Main cloud gradient - warm popcorn white/cream -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffdf7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fef9ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <!-- Accent puff gradient - warm amber -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Light puff -->
    <linearGradient id="lightPuff" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Cloud outline stroke -->
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#92400e" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Main cloud shape -->
  <g filter="url(#softShadow)">
    <!-- Cloud body - smooth overlapping circles -->
    <circle cx="95" cy="88" r="36" fill="url(#cloudGrad)" stroke="#eab308" stroke-width="0.8"/>
    <circle cx="60" cy="92" r="28" fill="url(#cloudGrad)" stroke="#eab308" stroke-width="0.8"/>
    <circle cx="130" cy="92" r="28" fill="url(#cloudGrad)" stroke="#eab308" stroke-width="0.8"/>
    <circle cx="75" cy="68" r="26" fill="url(#cloudGrad)" stroke="#eab308" stroke-width="0.8"/>
    <circle cx="115" cy="66" r="27" fill="url(#cloudGrad)" stroke="#eab308" stroke-width="0.8"/>
    <circle cx="95" cy="56" r="22" fill="url(#cloudGrad)" stroke="#eab308" stroke-width="0.8"/>
    <!-- Smooth fill -->
    <rect x="38" y="88" width="120" height="24" rx="12" fill="url(#cloudGrad)"/>
  </g>

  <!-- Floating floccus puffs (scattered small clouds) -->
  <circle cx="152" cy="52" r="8" fill="url(#lightPuff)" opacity="0.7"/>
  <circle cx="145" cy="40" r="6" fill="url(#lightPuff)" opacity="0.5"/>
  <circle cx="160" cy="42" r="5" fill="url(#lightPuff)" opacity="0.4"/>
  <circle cx="30" cy="60" r="6" fill="url(#lightPuff)" opacity="0.5"/>
  <circle cx="22" cy="70" r="5" fill="url(#lightPuff)" opacity="0.35"/>
  <circle cx="155" cy="78" r="4" fill="url(#lightPuff)" opacity="0.3"/>

  <!-- Accent sparkle dots (popcorn pop!) -->
  <circle cx="80" cy="48" r="3.5" fill="url(#accentGrad)"/>
  <circle cx="110" cy="44" r="3" fill="url(#accentGrad)" opacity="0.9"/>
  <circle cx="62" cy="62" r="2.5" fill="url(#accentGrad)" opacity="0.7"/>
  <circle cx="128" cy="58" r="2" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="95" cy="40" r="2" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Cloud shine highlights -->
  <ellipse cx="80" cy="62" rx="14" ry="8" fill="white" opacity="0.15"/>
  <ellipse cx="105" cy="58" rx="10" ry="6" fill="white" opacity="0.12"/>
  <circle cx="70" cy="72" r="4" fill="white" opacity="0.2"/>

  <!-- Text: Floci -->
  <text x="185" y="82" font-size="58" font-weight="800" font-family="'Inter', 'Nunito', 'Segoe UI', system-ui, sans-serif" fill="#78350f" letter-spacing="-2">Floci</text>

  <!-- Tagline -->
  <text x="188" y="108" font-size="14" font-family="'Inter', 'Nunito', 'Segoe UI', system-ui, sans-serif" fill="#b45309" letter-spacing="0.5">Light, fluffy, and always free</text>
</svg>
